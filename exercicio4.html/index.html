<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplo site com css javascript</title>
    <link rel="stylesheet" href="estilo/style.css">
</head>
<body>
    
    <header class="cabecalho">
        <div class="main">
            <img src="imagens/logo.png" alt="logo da empresa">
            <nav>
                <a href="#"><img src="imagens/linkedin.png" alt="linkedin"></a>
                <a href="#"><img src="imagens/face.png" alt="facebock"></a>
                <a href="#"><img src="imagens/tw.png" alt="tweter"></a>
                <a href="#"><img src="imagens/rss.png" alt=""></a>
            </nav> 
        </div>
             
    </header>
    <main>
        <header class="menu">
            <nav>
                <a href="#">HOME</a>
                <a href="#">ABOUT</a>
                <a href="#">SERVICE</a>
                <a href="#">PAGE</a>
                <a href="#">BLOG</a>
                <a href="#">CONTACT</a>
                <input placeholder="    SEARCH " type="text">
            </nav>
        </header>

        <header class="slider">
            <img src="imagens/banner.png" alt="baner" id="slider">
            <div class="button">
                <div>
                    <button id="anterior"><img src="imagens/anterior.png" alt="anterior"></button>
                    <button id="posterior"><img src="imagens/proximo.png" alt="posterior"></button>
                </div>
            </div>

    </main>
    <script src="./js/config.js"></script>

</html>
